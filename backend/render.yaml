services:
  - type: web
    name: nyay-justis-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "10"
      - key: DB_POOL_TIMEOUT_SECONDS
        value: "30"
      - key: DB_POOL_RECYCLE_SECONDS
        value: "1800"
      - key: SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EXTRACTION_MODEL
        value: "gpt-4.1"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "90"
      - key: ENABLE_MULTILINGUAL_PIPELINE
        value: "true"
      - key: MULTILINGUAL_TARGET_LANGUAGE
        value: "English"
      - key: SUPPORTED_DOCUMENT_LANGUAGES
        value: "English,Hindi"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none"
      - key: COOKIE_DOMAIN
        sync: false
